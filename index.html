<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ELECTIVOS DE DISEÑO</title>
        <style>
            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --color-oscurisimo: hsl(234, 66%, 30%);
                --color-oscuro: hsl(233, 50%, 45%);
                --color-normal: hsl(233, 43%, 56%);
                --color-iluminado: hsl(233, 36%, 84%);
                --color-iluminadisimo: hsl(229, 35%, 94%);
            }

            body {
                font-family: Helvetica, Arial, sans-serif;
                color: var(--color-normal);
                text-align: center;
                font-size: 100%;
            }
            div#contenedor {
                margin: 1rem auto;
                width: 90%;
                max-width: 780px;
            }

            h1 {
                margin: 1rem 0;
                font-weight: 400;
                font-size: calc(100% + 3vw + 3vh);
            }

            h2 {
                margin: 3rem 0;
                font-weight: 400;
                letter-spacing: 0.25rem;
                font-size: calc(100% + 1vw + 1vh);
                color: var(--color-oscuro);
            }

            input {
                border: 0.1rem solid var(--color-iluminado);
                padding: 0.5rem 1rem;
                font-family: inherit;
                font-size: 15px;
                color: var(--color-oscuro);
                outline: none;
                margin-bottom: 1.5rem;
                width: 100%;
                display: block;
                background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="blue" class="bi bi-emoji-laughing" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/><path d="M12.331 9.5a1 1 0 0 1 0 1A5 5 0 0 1 8 13a5 5 0 0 1-4.33-2.5A1 1 0 0 1 4.535 9h6.93a1 1 0 0 1 .866.5M7 6.5c0 .828-.448 0-1 0s-1 .828-1 0S5.448 5 6 5s1 .672 1 1.5m4 0c0 .828-.448 0-1 0s-1 .828-1 0S9.448 5 10 5s1 .672 1 1.5"/></svg>');
                background-repeat: no-repeat;
                background-size: 1rem;
                background-position: 99% center;
            }

            input::placeholder {
                color: var(--color-iluminado);
            }

            input:focus {
                border-color: var(--color-normal);
            }

            div#contenedordetabla {
                overflow-x: auto;
                font-size: 90%;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                text-align: left;
                margin-bottom: 3rem;
            }

            thead {
                background: var(--color-iluminado);
            }

            td,
            th {
                border: 1px solid var(--color-normal);
                padding: 0.75rem;
            }

            td:nth-child(1),
            th:nth-child(1),
            td:nth-child(3),
            th:nth-child(3) {
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>≽^•⩊•^≼</h1>
            <h2>ELECTIVOS DE DISEÑO</h2>

            <input type="text" id="elInput" placeholder="Filtrar electivos…" />
            <div id="contenedordetabla">
                <table>
                    <thead>
                        <tr>
                            <th>N°</th>
                            <th>Asignatura electiva</th>
                            <th>Mención</th>
                            <th>Grupo</th>
                            <th>Enfoque</th>
                        </tr>
                    </thead>
                    <tbody id="este"></tbody>
                </table>
            </div>
            <small>Diseño y visualización de información</small>
        </div>

        <script>
            const t = document.querySelector("#este");
            const URL = "https://api.myjson.online/v1/records/7ac2aed7-e914-4a8d-a8da-38a2d2d5a392";

            fetch(URL)
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })
                .then((datos) => {
                    var trabajo = datos.data;
                    console.log(trabajo);
                    trabajo.forEach((x) => {
                        t.innerHTML += `<tr style="${x.ok == 1 ? "background-color: var(--color-iluminadisimo); color: var(--color-oscurisimo)" : ""}"><td>${x.id}</td><td>${x.name}</td><td>${x.track}</td><td>${x.group}</td><td>${x.focus}</td></tr>`;
                    });
                })
                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });

            function sinAcentos(str) {
                return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            }

            document.getElementById("elInput").addEventListener("keyup", function () {
                const valor = sinAcentos(this.value.toLowerCase());
                document.querySelectorAll("#este tr").forEach(function (fila) {
                    fila.style.display = sinAcentos(fila.textContent.toLowerCase()).includes(valor) ? "" : "none";
                });
            });
        </script>
    </body>
</html>
